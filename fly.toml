# Fly.io configuration - Algorithm Dojo
app = "algorithm-dojo"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[vm]]
  # Free tier: shared-cpu-1x, 256MB
  size = "shared-cpu-1x"
  memory = "256mb"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  # Health check
  [services.http_checks]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    restart_limit = 3
    method = "get"
    path = "/"

# Persistent volume for JSON database
[mounts]
  source = "data"
  destination = "/app/data"
