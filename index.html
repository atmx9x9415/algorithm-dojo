<!-- ==================== 全局弹窗容器 ==================== -->
<div class="modal-overlay" id="globalModal">
  <div class="modal" id="globalModalInner">
    <div class="modal-header">
      <h3 id="globalModalTitle"></h3>
      <button class="modal-close" onclick="closeModal('globalModal')">&times;</button>
    </div>
    <div id="globalModalBody"></div>
  </div>
</div>

<!-- ==================== 脚本 ==================== -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="js/app.js"></script>

<!-- ==================== 公共交互脚本 ==================== -->
<script>
// 移动端菜单
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.getElementById('navToggle');
  var links = document.getElementById('navLinks');
  if (toggle && links) {
    toggle.addEventListener('click', function() { links.classList.toggle('open'); });
    links.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() { links.classList.remove('open'); });
    });
  }
  // 更新导航 active 状态
  updateNavActive();
  window.addEventListener('hashchange', updateNavActive);
});

function updateNavActive() {
  var h = window.location.hash || '#/';
  document.querySelectorAll('.nav-links a').forEach(function(a) {
    a.classList.remove('active');
  });
  if (h.startsWith('#/admin')) {
    document.getElementById('navAdmin') && document.getElementById('navAdmin').classList.add('active');
  } else if (h === '#/') {
    document.getElementById('navHome') && document.getElementById('navHome').classList.add('active');
  } else if (h.startsWith('#/problems')) {
    document.getElementById('navProblems') && document.getElementById('navProblems').classList.add('active');
  } else if (h.startsWith('#/tags')) {
    document.getElementById('navTags') && document.getElementById('navTags').classList.add('active');
  }
}

// 弹窗工具
function openModal(id) {
  var m = document.getElementById(id);
  if (m) { m.classList.add('active'); document.body.style.overflow = 'hidden'; }
}
function closeModal(id) {
  var m = document.getElementById(id);
  if (m) { m.classList.remove('active'); document.body.style.overflow = ''; }
}
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay') && e.target.classList.contains('active')) {
    closeModal(e.target.id);
  }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(function(m) { closeModal(m.id); });
  }
});

// 显示提示消息
function showToast(msg, type) {
  type = type || 'info';
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    setTimeout(function() { toast.remove(); }, 300);
  }, 2500);
}
</script>
</body>
</html>
