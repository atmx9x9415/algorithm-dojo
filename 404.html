  <title>算法道场 Algorithm Dojo</title>
  <script>
    // GitHub Pages SPA fallback: convert path to hash and redirect to index
    var path = window.location.pathname.replace(/\/algorithm-dojo\/?/, '');
    if (path) {
      window.location.replace(window.location.origin + '/algorithm-dojo/#/' + path);
    } else {
      window.location.replace(window.location.origin + '/algorithm-dojo/');
    }
  </script>
</head>
